name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 6 * * 1'

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  addy-promotion-gate:
    name: Addy 1.1.0 promotion gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate Addy promotion evidence
        env:
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p "$RUNNER_TEMP/addy-promotion"
          ./scripts/gate-addy-promotion.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > "$RUNNER_TEMP/addy-promotion/addy-promotion-evidence.v1.json"

      - name: Retain exact promotion decision
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: addy-promotion-pr-${{ github.run_id }}
          path: ${{ runner.temp }}/addy-promotion
          if-no-files-found: error
          retention-days: 90

  validate:
    name: Validate Packy-owned code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate allowlisted Packy-owned code
        run: ./scripts/validate-packy.sh

      - name: Scan Packy-owned Go code for known vulnerabilities
        continue-on-error: true
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false

  claude-floor-smoke:
    name: Claude 2.1.203 package smoke
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Run exact-floor package smoke
        run: |
          ./scripts/run-claude-smoke.sh \
            --claude-version 2.1.203 \
            --packy-ref "$GITHUB_SHA" \
            --evidence-dir "$RUNNER_TEMP/claude-floor-evidence" \
            --addy-qualification synthetic \
            --addy-workflow .github/workflows/ci.yml

      - name: Retain exact-floor evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: claude-floor-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/claude-floor-evidence
          if-no-files-found: error
          retention-days: 90

  addy-promotion-main-replay:
    name: Replay Addy promotion gate effect-free
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out protected main
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Replay exact main evidence without effects
        run: |
          ./scripts/replay-addy-promotion.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "$RUNNER_TEMP/addy-promotion-main"

      - name: Retain exact main replay
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: addy-promotion-main-${{ github.run_id }}
          path: ${{ runner.temp }}/addy-promotion-main
          if-no-files-found: error
          retention-days: 90
